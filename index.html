<!DOCTYPE html>

<head>

  <!-- CSS -->

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
  <a class="active" href="index.html">Home</a>
  <a href="food.html">Food</a>

<div class="masonry">

  <!-- PIN -->

  <div class="pin-info">
    <span>love frozen grapes!</span>

    <div class="menu">
      <button onclick="toggleMenu(this)">
        <i class="fa-solid fa-ellipsis"></i>
      </button>

      <div class="dropdown">
        <p>Save</p>
        <p>Share</p>
        <p>Download</p>

    </div>
  </div>
</div>

  <div class="pin">
    <img src="images/clothes2.jpeg" width="200">

    <button class="save-btn">Save</button>

    <div class="pin-info">
      <span>save this!</span>

      <div class="menu">
        <button onclick="toggleMenu(this)">
          <i class="fa-solid fa-ellipsis"></i>
        </button>

        <div class="dropdown">
          <p>Save</p>
          <p>Share</p>
          <p>Download</p>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <a href="index.html" class="active"><i class="fa-solid fa-house"></i></a>

  <a href="profile.html"><img src="images/profile.jpg" class="profile-icon"></a>
</div>

<script>
function toggleMenu(button) {
  const dropdown = button.nextElementSibling;
  dropdown.classList.toggle("show");
}
</script>

</body>
</html>
