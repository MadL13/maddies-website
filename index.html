<!DOCTYPE html>
<html lang="en">
<head><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <meta charset="UTF-8">
  <title>Home</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <a class="active" href="index.html">Home</a>
  <a href="food.html">Food</a>
  <a href="clothes.html">Clothes</a>
  <a href="#">Jewelry</a>
</div>

<!-- IMAGE GRID -->
<div class="grid">

  <!-- CARD -->
  <div class="card">
    <img src="https://via.placeholder.com/300x400">
    <div class="caption-bar">
      <span>Yummy salad!</span>

      <div class="menu">
        <button onclick="toggleMenu(this)">
          <i class="fa-solid fa-ellipsis"></i>
        </button>
        <div class="dropdown">
          <p><i class="fa-solid fa-bookmark"></i> Save</p>
          <p><i class="fa-solid fa-share"></i> Share</p>
          <p><i class="fa-solid fa-download"></i> Download</p>
        </div>
      </div>

    </div>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300x250">
    <div class="caption-bar">
      <span>Cool outfit!</span>

      <div class="menu">
        <button onclick="toggleMenu(this)">⋯</button>
        <div class="dropdown">
          <p>Save</p>
          <p>Share</p>
          <p>Download</p>
        </div>
      </div>

    </div>
  </div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-bar">
  <i class="fa-solid fa-house"></i>
  <i class="fa-solid fa-magnifying-glass"></i>
  <i class="fa-solid fa-plus"></i>
  <i class="fa-solid fa-comment"></i>
  <img src="https://via.placeholder.com/30" class="profile-icon">
</div>

<script>
function toggleMenu(button) {
  const dropdown = button.nextElementSibling;
  dropdown.classList.toggle("show");
}
</script>

</body>
</html>
